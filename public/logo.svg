<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="maskGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d49a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="maskSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0c8b8"/>
      <stop offset="100%" stop-color="#7a7060"/>
    </linearGradient>
  </defs>

  <!-- Glow behind masks -->
  <ellipse cx="40" cy="40" rx="38" ry="36" fill="url(#glow)"/>

  <!-- ── COMEDY MASK (front, gold) ── -->
  <g transform="translate(8, 6)">
    <!-- Face -->
    <ellipse cx="22" cy="28" rx="18" ry="22" fill="url(#maskGold)" stroke="#8a6020" stroke-width="1.2"/>
    <!-- Brow ridge -->
    <path d="M6 20 Q22 14 38 20" stroke="#6a4a18" stroke-width="1.5" fill="none"/>
    <!-- Eyes - upturned happy -->
    <path d="M11 24 Q15 20 19 24" stroke="#3a2808" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M25 24 Q29 20 33 24" stroke="#3a2808" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M20 28 Q22 32 24 28" stroke="#6a4a18" stroke-width="1.2" fill="none"/>
    <!-- Big smile -->
    <path d="M10 36 Q22 46 34 36" stroke="#3a2808" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Teeth hint -->
    <path d="M13 38 Q22 44 31 38" fill="#f0e8d0" opacity="0.7"/>
    <!-- Laurel crown hint -->
    <path d="M5 18 Q8 12 12 16 Q16 10 20 14 Q24 10 28 14 Q32 12 35 18" stroke="#5a8030" stroke-width="1.5" fill="none"/>
    <!-- Eye holes (hollow) -->
    <ellipse cx="15" cy="24" rx="3.5" ry="3" fill="#2a1808" opacity="0.5"/>
    <ellipse cx="29" cy="24" rx="3.5" ry="3" fill="#2a1808" opacity="0.5"/>
  </g>

  <!-- ── TRAGEDY MASK (behind, silver, offset right/back) ── -->
  <g transform="translate(26, 10)" opacity="0.88">
    <!-- Face -->
    <ellipse cx="22" cy="28" rx="17" ry="21" fill="url(#maskSilver)" stroke="#58504a" stroke-width="1.2"/>
    <!-- Brow ridge - furrowed -->
    <path d="M7 20 Q22 16 37 20" stroke="#48403a" stroke-width="1.2" fill="none"/>
    <!-- Sad eyebrows -->
    <path d="M10 19 Q15 17 18 21" stroke="#3a3028" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M26 21 Q29 17 34 19" stroke="#3a3028" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Eyes - downturned sad -->
    <path d="M11 25 Q15 29 19 25" stroke="#2a2820" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M25 25 Q29 29 33 25" stroke="#2a2820" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Frown -->
    <path d="M12 38 Q22 30 32 38" stroke="#2a2820" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Tears -->
    <ellipse cx="13" cy="32" rx="1.2" ry="2" fill="#a0b8c8" opacity="0.7"/>
    <ellipse cx="31" cy="32" rx="1.2" ry="2" fill="#a0b8c8" opacity="0.7"/>
    <!-- Eye holes -->
    <ellipse cx="15" cy="25" rx="3" ry="2.8" fill="#1a1810" opacity="0.5"/>
    <ellipse cx="29" cy="25" rx="3" ry="2.8" fill="#1a1810" opacity="0.5"/>
  </g>

  <!-- ── COSTUME ELEMENT (draped fabric, bottom left) ── -->
  <g transform="translate(4, 52)">
    <path d="M0 0 Q8 -4 16 0 Q24 4 32 0 Q36 2 38 6 Q30 10 20 8 Q10 10 0 6 Z" fill="#8b1a2e" opacity="0.8"/>
    <path d="M4 4 Q12 0 20 4 Q28 8 36 4" stroke="#c4344e" stroke-width="0.8" fill="none" opacity="0.6"/>
    <!-- Gold trim -->
    <path d="M0 6 Q10 10 20 8 Q30 10 38 6" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.8"/>
  </g>

  <!-- ── PROP ELEMENT (mask stick handle) ── -->
  <line x1="30" y1="54" x2="34" y2="72" stroke="#8a6020" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="80" y1="12" x2="80" y2="68" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>

  <!-- ── WORDMARK ── -->
  <!-- BACKSTAGE -->
  <text x="92" y="34" 
    font-family="'Playfair Display', Georgia, serif" 
    font-size="22" 
    font-weight="900"
    fill="#c9a84c"
    letter-spacing="1">BACKSTAGE</text>
  <!-- MANAGER -->
  <text x="92" y="56" 
    font-family="'Playfair Display', Georgia, serif" 
    font-size="22" 
    font-weight="400"
    font-style="italic"
    fill="#e8d49a"
    letter-spacing="2">Manager</text>
  <!-- Tagline -->
  <text x="92" y="70"
    font-family="'DM Mono', monospace"
    font-size="7"
    fill="#8a6f30"
    letter-spacing="3">COSTUME · PROPS · INVENTORY</text>
</svg>
